name: Chat Doctor CI/CD Pipeline 
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10" 
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: |
        echo "No tests yet, add pytest later" 
    - name: Build Docker image
      run: |
        docker build -t chat-doctor .

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }} 
    - name: Tag and Push Docker Image
      run: |
        docker tag chat-doctor ${{ secrets.DOCKER_USERNAME }}/chat-doctor:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/chat-doctor:latest
